kind = "web"
previewPath = "/"
title = "Hackathon Evaluation System"
version = "1.0.0"
id = "artifacts/hackathon-eval"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19851

[services.development]
run = "pnpm --filter @workspace/hackathon-eval run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hackathon-eval", "run", "build" ]
publicDir = "artifacts/hackathon-eval/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19851"
BASE_PATH = "/"
