# Render Blueprint — Hackathon ScoreBoard
# Deploy: Render Dashboard → New → Blueprint → connect this repo
# Docs: docs/SETUP_AND_DEPLOYMENT.md

services:
  # ── Frontend (primary app) ─────────────────────────────────────────────
  - type: web
    name: hackathon-eval
    runtime: static
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.34.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/hackathon-eval run build
    staticPublishPath: artifacts/hackathon-eval/dist/public
    routes:
      # SPA client-side routing (Wouter)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: BASE_PATH
        value: /
      # Set these in the Render dashboard (secrets — do not commit real values):
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false

  # ── API (optional — health check only today) ───────────────────────────
  - type: web
    name: hackathon-api
    runtime: node
    plan: free
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.34.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # PORT is injected automatically by Render
